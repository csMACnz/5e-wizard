name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build, Test & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore src/CharacterWizard.slnx

      - name: Build
        run: dotnet build src/CharacterWizard.slnx -c Release --no-restore

      - name: Test (includes schema + data validation)
        run: dotnet test src/CharacterWizard.Tests/CharacterWizard.Tests.csproj -c Release --no-build --collect:"XPlat Code Coverage" --results-directory ./coverage-results

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/CharacterWizard.E2ETests.csproj') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh src/CharacterWizard.E2ETests/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: E2E Tests
        run: dotnet test src/CharacterWizard.E2ETests/CharacterWizard.E2ETests.csproj -c Release --no-build --results-directory ./e2e-results

      - name: Format check
        run: dotnet format src/CharacterWizard.slnx --verify-no-changes
